; https://docs.platformio.org/page/projectconf.html

[env:atmega328p_xplained]
platform = atmelavr
board = ATmega328P
framework = arduino
board_build.f_cpu = 16000000L

monitor_speed = 9600

upload_protocol = custom
upload_command = C:\Users\User\.platformio\packages\tool-avrdude\avrdude.exe -C C:\Users\User\.platformio\packages\tool-avrdude\avrdude.conf -p atmega328p -c xplainedmini_isp -P usb -e -U flash:w:$SOURCE:i

